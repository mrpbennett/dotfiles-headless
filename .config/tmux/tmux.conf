# =============================================================================
# General Settings
# =============================================================================
# Unbind default prefix (Ctrl+b)
unbind C-b

# Set Ctrl+s as new leader key
set -g prefix C-s
bind C-s send-prefix

set -g set-clipboard on          # use system clipboard
set -g status-position top       # macOS / darwin style
set -g detach-on-destroy off     # don't exit from tmux when closing a session

setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# neovim needs this to detect gain/loses focus
set -g focus-events on

# Enable Yazi Image Previewer
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Reload config
unbind r
bind R source-file "$HOME/.config/tmux/tmux.conf" \; display-message "tmux.conf reloaded ☺️"

set -g default-shell /bin/bash
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",*:RGB"
set -g mouse on
set -g history-limit 50000
set -g escape-time 0
set -g extended-keys-format csi-u
set -g terminal-features[3] "xterm-kitty:extkeys"
set -as terminal-features ",*:clipboard"
setw -g aggressive-resize on

# Help popup
bind ? display-popup -E -w 80% -h 70% -T "Tmux keybindings" "tmux list-keys | less -R"

# =============================================================================
# Window, Pane & Session Management
# =============================================================================

# Pane navigation using hjkl
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind -r -T prefix H resize-pane -L 5
bind -r -T prefix J resize-pane -D 5
bind -r -T prefix K resize-pane -U 5
bind -r -T prefix L resize-pane -R 5

# No-prefix pane operations
bind -n M-Enter split-window -v -c "#{pane_current_path}"
bind -n M-S-Enter split-window -h -c "#{pane_current_path}"
bind -n M-Escape kill-pane
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

bind x kill-pane
bind r command-prompt -I "#W" "rename-window '%%'" # rename tab

# Pop a floating pane: Opens a large centered popup with your default shell
bind f display-popup -w 80% -h 80% -E $SHELL

# LazyVim Window splits
bind | split-window -h -c "#{pane_current_path}"    # split window right
bind - split-window -v -c "#{pane_current_path}"    # split window down
bind v split-window -h -c "#{pane_current_path}"    # split window right

unbind c
bind t new-window -c "#{pane_current_path}"         # new tab with <leader> t
bind c new-window -c "#{pane_current_path}"         # (omadots) new window

# Window and pane numbering
set -g base-index 1                                 # Start windows at 1, not 0
setw -g pane-base-index 1                           # Start panes at 1, not 0
set -g renumber-windows on                          # renumber all windows when any window is closed

set -g automatic-rename off
set -g allow-rename off

#bind s command-prompt -p "Session name:" "new-session -s '%%'"
bind S command-prompt -p "Rename Session:" "rename-session '%%'"
bind q kill-session

# fixing claude bug when trying to set newline
# https://code.claude.com/docs/en/terminal-config#configure-tmux
set -g allow-passthrough on
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'

# Session controls
bind C new-session -c "#{pane_current_path}"
bind P switch-client -p
bind N switch-client -n

# No-prefix window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9
bind -n M-Left select-window -t -1
bind -n M-Right select-window -t +1
bind -n M-S-Left swap-window -t -1 \; select-window -t -1
bind -n M-S-Right swap-window -t +1 \; select-window -t +1
bind -n M-Up switch-client -p
bind -n M-Down switch-client -n

# =============================================================================
# Sesh keybind
# =============================================================================
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
# =============================================================================
# List of plugins
# =============================================================================
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'alexwforsythe/tmux-which-key'

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'
set -g set-titles on
set -g set-titles-string '#h:#W'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

# ============================================================================
# INITIALIZE TMUX PLUGIN MANAGER
# ============================================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
run '~/.tmux/plugins/tpm/tpm'
