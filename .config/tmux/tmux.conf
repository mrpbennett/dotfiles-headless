# =============================================================================
# General Settings
# =============================================================================
# Unbind default prefix (Ctrl+b)
unbind C-b

# Set Ctrl+s as new leader key
set -g prefix C-s
bind C-s send-prefix

# General
set -ag terminal-overrides ",*:RGB"
set -g automatic-rename off
set -g allow-rename off
set -g default-terminal "tmux-256color"
set -g mouse on
set -g history-limit 50000
set -g extended-keys on
set -g extended-keys-format csi-u
set -g terminal-features[3] "xterm-kitty:extkeys"
set -g allow-passthrough on
set -as terminal-features 'xterm*:extkeys'
set -as terminal-features ",*:clipboard"
set -g set-clipboard on
set -g status-position top
set -g detach-on-destroy off
set -g focus-events on
setw -g aggressive-resize on
set -s extended-keys on
set -sg escape-time 10

# Enable Yazi Image Previewer
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Setting zsh as default
set-option -g default-shell /bin/zsh
set-option -g default-command "zsh"

# Config and help
bind q source-file ~/.config/tmux/tmux.conf \; display "Configuration reloaded"
bind ? display-popup -E -w 80% -h 70% -T "Tmux keybindings" "tmux list-keys | less -R"

# Vi mode for copy
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# =============================================================================
# Window, Pane & Session Management
# =============================================================================

# Pane Controls

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

bind v split-window -h -c "#{pane_current_path}"

bind x kill-pane

# Pane navigation using hjkl
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

bind -r -T prefix H resize-pane -L 5
bind -r -T prefix J resize-pane -D 5
bind -r -T prefix K resize-pane -U 5
bind -r -T prefix L resize-pane -R 5

# No-prefix pane operations
bind -n M-Enter split-window -v -c "#{pane_current_path}"
bind -n M-S-Enter split-window -h -c "#{pane_current_path}"
bind -n M-Escape kill-pane
bind -n C-M-Left select-pane -L
bind -n C-M-Right select-pane -R
bind -n C-M-Up select-pane -U
bind -n C-M-Down select-pane -D
bind -n C-M-S-Left resize-pane -L 5
bind -n C-M-S-Down resize-pane -D 5
bind -n C-M-S-Up resize-pane -U 5
bind -n C-M-S-Right resize-pane -R 5

# Window navigation
bind r command-prompt -I "#W" "rename-window '%%'" # rename tab
bind c new-window -c "#{pane_current_path}"
bind t new-window -c "#{pane_current_path}"
bind k kill-window

# Session Controls
bind R command-prompt -I "#S" "rename-session -- '%%'"
bind C new-session -c "#{pane_current_path}"
bind K kill-session

# Window and pane numbering
set -g base-index 1                                 # Start windows at 1, not 0
setw -g pane-base-index 1                           # Start panes at 1, not 0
set -g renumber-windows on                          # renumber all windows when any window is closed

# Pop a floating pane: Opens a large centered popup with your default shell
bind f display-popup -w 80% -h 60% -E $SHELL

# =============================================================================
# Sesh keybind
# =============================================================================
bind-key "T" run-shell "sesh connect \"$(
  sesh list --icons | fzf-tmux -p 80%,70% \
    --no-sort --ansi --border-label ' sesh ' --prompt '⚡  ' \
    --header '  ^a all ^t tmux ^g configs ^x zoxide ^d tmux kill ^f find' \
    --bind 'tab:down,btab:up' \
    --bind 'ctrl-a:change-prompt(⚡  )+reload(sesh list --icons)' \
    --bind 'ctrl-t:change-prompt(🪟  )+reload(sesh list -t --icons)' \
    --bind 'ctrl-g:change-prompt(⚙️  )+reload(sesh list -c --icons)' \
    --bind 'ctrl-x:change-prompt(📁  )+reload(sesh list -z --icons)' \
    --bind 'ctrl-f:change-prompt(🔎  )+reload(fd -H -d 2 -t d -E .Trash . ~)' \
    --bind 'ctrl-d:execute(tmux kill-session -t {2..})+change-prompt(⚡  )+reload(sesh list --icons)' \
    --preview-window 'right:55%' \
    --preview 'sesh preview {}'
)\""
# =============================================================================
# List of plugins
# =============================================================================
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'alexwforsythe/tmux-which-key'

# =============================================================================
# Status Bar & Theme
# =============================================================================

# Status bar
set -g status-position top
set -g status-interval 5
set -g status-left-length 30
set -g status-right-length 50
set -g window-status-separator ""
set -gw automatic-rename on
set -gw automatic-rename-format '#{b:pane_current_path}'
set -g set-titles on
set -g set-titles-string '#h:#W'

# Theme
set -g status-style "bg=default,fg=default"
set -g status-left "#[fg=black,bg=blue,bold] #S #[bg=default] "
set -g status-right "#[fg=blue]#{?pane_in_mode,COPY ,}#{?client_prefix,PREFIX ,}#{?window_zoomed_flag,ZOOM ,}#[fg=brightblack]#h "
set -g window-status-format "#[fg=brightblack] #I:#W "
set -g window-status-current-format "#[fg=blue,bold] #I:#W "
set -g pane-border-style "fg=brightblack"
set -g pane-active-border-style "fg=blue"
set -g message-style "bg=default,fg=blue"
set -g message-command-style "bg=default,fg=blue"
set -g mode-style "bg=blue,fg=black"
setw -g clock-mode-colour blue

# ============================================================================
# INITIALIZE TMUX PLUGIN MANAGER
# ============================================================================
set-environment -g TMUX_PLUGIN_MANAGER_PATH "$HOME/.tmux/plugins/"
run '~/.tmux/plugins/tpm/tpm'
